name: Scrape HSL Stats Daily

on:
  schedule:
    # Runs every day at 6:00 AM UTC (midnight Mountain Time)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allows you to run it manually from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Auto-update stats $(date -u '+%Y-%m-%d')"
          git push
