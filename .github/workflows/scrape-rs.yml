name: Scrape Playoffs

on:
  schedule:
    - cron: '30 */2 * * *'   # every 2 hours (playoffs move fast!)
  workflow_dispatch:          # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45       # PO fewer games, should be ~5 min
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper (playoffs)
        run: python scrape.py --mode po

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/game_cache.json
          git diff --staged --quiet || git commit -m "chore: update playoff stats [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push
