name: Scrape Regular Season

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # RS should finish in ~10 min
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper (regular season)
        run: python scrape.py --mode rs

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/game_cache.json
          git diff --staged --quiet || git commit -m "chore: update regular season stats [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
